<!DOCTYPE html>
<html lang="{{HTML_LANG}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_TITLE}}</title>
    <meta name="description" content="{{PAGE_DESCRIPTION}}">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="{{CANONICAL_URL}}">
{{HREFLANG_LINKS}}
    <meta property="og:type" content="website">
    <meta property="og:locale" content="{{OG_LOCALE}}">
    <meta property="og:title" content="{{PAGE_TITLE}}">
    <meta property="og:description" content="{{PAGE_DESCRIPTION}}">
    <meta property="og:url" content="{{CANONICAL_URL}}">
    <meta property="og:image" content="https://www.cacaou.net/images/og-image.jpg">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="{{PAGE_TITLE}}">
    <meta property="twitter:description" content="{{PAGE_DESCRIPTION}}">
    <meta property="twitter:url" content="{{CANONICAL_URL}}">
    <link rel="icon" type="image/png" href="{{ASSET_PREFIX}}images/favicon.png">
    <link rel="stylesheet" href="{{ASSET_PREFIX}}styles.css">
    <link rel="stylesheet" href="{{ASSET_PREFIX}}news.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar news-navbar">
        <div class="container">
            <div class="nav-content">
                <div class="logo"><a class="news-logo-link" href="{{ASSET_PREFIX}}">cacaou</a></div>
                <ul class="nav-menu">
{{NAV_MENU_ITEMS}}
                </ul>
                <div class="language-selector news-lang-switch" role="navigation" aria-label="News language">
{{LANG_SWITCHER}}
                </div>
            </div>
        </div>
    </nav>

    <main class="news-page">
        <section class="news-hero">
            <div class="container">
                <p class="news-kicker">{{KICKER}}</p>
                <h1>{{HERO_TITLE}}</h1>
                <p>{{HERO_DESCRIPTION}}</p>
            </div>
        </section>

        <section class="news-list-section">
            <div class="container">
                <div class="news-grid">
                    {{ARTICLES}}
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; {{CURRENT_YEAR}} cacaou. {{FOOTER_RIGHTS}}</p>
            </div>
        </div>
    </footer>
</body>
</html>
